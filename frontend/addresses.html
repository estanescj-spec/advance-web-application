<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Addresses - MacSphere</title>
    <meta name="description" content="Manage your MacSphere delivery addresses.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }

        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 9999;
            min-width: 220px;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.13);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
        }
        #toast.show   { opacity: 1; transform: translateY(0); }
        #toast.success { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
        #toast.error   { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
        
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link.active {
            background: #f8fafc;
            color: #2a52be;
            font-weight: 600;
            border-left: 3px solid #2a52be;
        }
        .sidebar-link:not(.active):hover {
            background: #f8fafc;
            color: #1e293b;
            border-left: 3px solid #e2e8f0;
        }
        
        .dropdown:hover .dropdown-menu { display: block; }
        
        .modal-backdrop { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen w-screen overflow-y-auto m-0 p-0">

    <div id="toast"><i id="toast-icon"></i><span id="toast-msg"></span></div>

    <div class="w-full min-h-screen flex flex-col">

        <!-- HEADER -->
        <header class="bg-white/90 backdrop-blur-md py-5 px-10 w-full z-30 border-b border-gray-100/50 shadow-[0_4px_30px_rgba(0,0,0,0.03)] sticky top-0">
            <div class="max-w-[1440px] mx-auto flex items-center justify-between w-full space-x-8">

                <div class="flex items-center space-x-3 shrink-0 cursor-pointer" id="brand-logo">
                    <svg class="w-7 h-7 text-black stroke-current fill-none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        <path d="M3.6 9h16.8"/><path d="M3.6 15h16.8"/>
                    </svg>
                    <div class="text-2xl font-semibold text-[#0f172a] tracking-tight">MACSPHERE</div>
                </div>

                <div class="flex items-center space-x-8 flex-1 max-w-2xl">
                    <div class="relative dropdown shrink-0">
                        <button class="flex items-center space-x-1.5 text-gray-700 font-medium text-xs tracking-wide uppercase hover:text-black transition py-2">
                            <span>Categories</span>
                            <i class="fa-solid fa-chevron-down text-[10px]"></i>
                        </button>
                        <div id="category-dropdown-menu" class="dropdown-menu hidden absolute left-0 mt-0 w-44 bg-white border border-gray-100 rounded-xl shadow-xl py-2 z-40">
                            <a href="home.html" class="block px-4 py-2.5 text-xs text-gray-900 font-semibold hover:bg-gray-50 transition">Home</a>
                            <div id="nav-category-list" class="text-xs text-gray-400 px-4 py-2">Loading...</div>
                        </div>
                    </div>

                    <div class="relative flex-1">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-gray-400 text-sm">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <input type="text" id="search-input" placeholder="Search products..." class="w-full bg-gray-50 text-xs font-medium text-gray-800 placeholder-gray-400 pl-10 pr-4 py-2.5 rounded-full border border-gray-100 focus:outline-none focus:border-blue-200 focus:bg-white transition">
                    </div>
                </div>

                <div class="flex items-center space-x-7 text-gray-700 shrink-0">
                    <button id="profile-btn" class="hover:text-black transition text-lg" title="Profile">
                        <i class="fa-regular fa-user"></i>
                    </button>
                    <button id="cart-btn" class="flex items-center space-x-1.5 hover:text-black transition text-gray-800 relative" title="Cart">
                        <i class="fa-solid fa-shopping-bag text-lg"></i>
                        <span id="cart-count" class="text-sm font-normal">0</span>
                    </button>
                    <button id="auth-btn" class="bg-red-600 hover:bg-red-700 text-white font-medium text-sm px-7 py-2.5 rounded-full shadow-md shadow-blue-600/10 transition-all transform active:scale-95 flex items-center space-x-2">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span>Log Out</span>
                    </button>
                </div>

            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main class="flex-1 max-w-[1440px] mx-auto w-full px-10 py-10">
            <div class="flex flex-col lg:flex-row gap-8">
                
                <!-- SIDEBAR -->
                <aside class="w-full lg:w-64 shrink-0">
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden py-3">
                        <a href="profile.html" class="sidebar-link block px-6 py-3 text-sm text-slate-600 border-l-[3px] border-transparent">
                            <i class="fa-solid fa-id-card w-6"></i> Account Details
                        </a>
                        <a href="orders.html" class="sidebar-link block px-6 py-3 text-sm text-slate-600 border-l-[3px] border-transparent">
                            <i class="fa-solid fa-box w-6"></i> Order History
                        </a>
                        <a href="addresses.html" class="sidebar-link active block px-6 py-3 text-sm text-slate-600 border-l-[3px] border-transparent">
                            <i class="fa-solid fa-map-location-dot w-6"></i> Addresses
                        </a>
                    </div>
                </aside>

                <!-- CONTENT AREA -->
                <div class="flex-1 bg-white rounded-2xl border border-slate-100 shadow-sm p-8 relative min-h-[400px]">
                    
                    <div id="loading" class="absolute inset-0 bg-white/80 z-10 flex items-center justify-center rounded-2xl">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-[#2a52be]"></i>
                    </div>

                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h1 class="text-2xl font-bold text-slate-900 mb-1">My Addresses</h1>
                            <p class="text-sm text-slate-500">Manage your delivery addresses for seamless checkout.</p>
                        </div>
                        <button id="open-add-modal-btn" class="bg-[#2a52be] hover:bg-[#1f3d90] text-white font-medium py-2 px-5 rounded-lg shadow-md transition-all text-sm flex items-center gap-2">
                            <i class="fa-solid fa-plus"></i> Add Address
                        </button>
                    </div>

                    <div id="addresses-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Addresses rendered here -->
                    </div>
                    
                    <div id="no-addresses" class="hidden text-center py-16">
                        <i class="fa-solid fa-map-location-dot text-4xl text-slate-200 mb-3"></i>
                        <h3 class="text-lg font-medium text-slate-700">No addresses saved</h3>
                        <p class="text-sm text-slate-500 mt-1">Add a delivery address to speed up checkout.</p>
                    </div>
                </div>

            </div>
        </main>

        <!-- FOOTER -->
        <footer class="bg-white py-6 px-10 border-t border-gray-100 mt-auto">
            <div class="max-w-[1440px] mx-auto text-center text-gray-400 text-xs">
                &copy; 2025 MacSphere &mdash; All Rights Reserved
            </div>
        </footer>
    </div>

    <!-- ADD ADDRESS MODAL -->
    <div id="add-modal" class="hidden fixed inset-0 modal-backdrop z-50 items-center justify-center px-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden transform scale-95 opacity-0 transition-all duration-200" id="add-modal-content">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-800">Add New Address</h3>
                <button id="close-modal-btn" class="text-slate-400 hover:text-slate-700"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <form id="address-form" class="p-6">
                <div id="modal-error" class="hidden mb-4 bg-red-50 border border-red-200 text-red-600 text-xs px-3 py-2 rounded-lg"></div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Address Line</label>
                        <input type="text" id="address_line" required class="w-full bg-slate-50 text-slate-900 px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-[#2a52be] focus:bg-white text-sm" placeholder="123 Apple Orchard Street">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">City</label>
                            <input type="text" id="city" required class="w-full bg-slate-50 text-slate-900 px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-[#2a52be] focus:bg-white text-sm" placeholder="Taguig City">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">Zip Code</label>
                            <input type="text" id="zipcode" required class="w-full bg-slate-50 text-slate-900 px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-[#2a52be] focus:bg-white text-sm" placeholder="1630">
                        </div>
                    </div>

                    <div class="flex items-center gap-2 pt-2">
                        <input type="checkbox" id="is_default" class="rounded border-slate-300 text-[#2a52be] focus:ring-[#2a52be]">
                        <label for="is_default" class="text-sm text-slate-600 cursor-pointer">Set as default address</label>
                    </div>
                </div>

                <div class="mt-8 flex justify-end gap-3">
                    <button type="button" id="cancel-modal-btn" class="px-4 py-2 rounded-xl border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50">Cancel</button>
                    <button type="submit" id="save-address-btn" class="px-5 py-2 rounded-xl bg-[#2a52be] text-white text-sm font-medium hover:bg-[#1f3d90] shadow-md transition">Save Address</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/config.js"></script>
    <script>
    $(document).ready(function () {
        function getToken() { return localStorage.getItem('token'); }
        if (!getToken()) { window.location.href = 'login.html'; return; }
        function authHeaders() { return { Authorization: `Bearer ${getToken()}` }; }

        let toastTimer;
        function showToast(msg, type = 'success') {
            const $t = $('#toast');
            $t.removeClass('success error show');
            $('#toast-icon').attr('class', type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark');
            $('#toast-msg').text(msg);
            $t.addClass(type).addClass('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => $t.removeClass('show'), 3000);
        }

        $('#auth-btn').on('click', function () {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        $('#cart-btn').on('click', () => window.location.href = 'cart.html');
        $('#brand-logo').on('click', () => window.location.href = 'home.html');

        function updateCartBadge() {
            $.ajax({ url: `${API_BASE}/cart`, method: 'GET', headers: authHeaders() })
            .done(function (res) {
                const total = (res.rows || []).reduce((s, i) => s + i.quantity, 0);
                $('#cart-count').text(total);
            }).fail(function () { $('#cart-count').text('0'); });
        }

        // --- Load Addresses ---
        function loadAddresses() {
            $('#loading').show();
            $.ajax({
                url: `${API_BASE}/addresses/my`,
                method: 'GET',
                headers: authHeaders()
            }).done(function (res) {
                const addresses = res.rows || [];
                const container = $('#addresses-container');
                container.empty();
                
                if (addresses.length === 0) {
                    $('#no-addresses').removeClass('hidden');
                } else {
                    $('#no-addresses').addClass('hidden');
                    addresses.forEach(addr => {
                        const defaultBadge = addr.is_default 
                            ? `<span class="inline-flex items-center gap-1 bg-[#2a52be]/10 text-[#2a52be] text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider"><i class="fa-solid fa-check"></i> Default</span>`
                            : '';
                        
                        const setDefaultBtn = !addr.is_default 
                            ? `<button class="set-default-btn text-xs text-slate-500 hover:text-[#2a52be] font-medium transition" data-id="${addr.id}">Set as default</button>`
                            : `<span class="text-xs text-slate-300">Default</span>`;

                        container.append(`
                            <div class="border ${addr.is_default ? 'border-[#2a52be]/30 bg-blue-50/20' : 'border-slate-200'} rounded-2xl p-5 relative group flex flex-col h-full">
                                <div class="flex justify-between items-start mb-3">
                                    <div class="h-6">${defaultBadge}</div>
                                    <button class="delete-address-btn text-slate-400 hover:text-red-500 transition p-1" data-id="${addr.id}" title="Delete Address">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </div>
                                <div class="text-slate-800 text-sm font-medium mb-1">${addr.address_line}</div>
                                <div class="text-slate-600 text-sm mb-4">${addr.city}, ${addr.zipcode}</div>
                                
                                <div class="mt-auto pt-4 border-t border-slate-100 flex justify-between items-center">
                                    ${setDefaultBtn}
                                </div>
                            </div>
                        `);
                    });
                }
                $('#loading').fadeOut(200);
            }).fail(function () {
                showToast('Failed to load addresses', 'error');
                $('#loading').fadeOut(200);
            });
        }

        // --- Actions ---
        $(document).on('click', '.delete-address-btn', function () {
            const id = $(this).data('id');
            if(confirm('Are you sure you want to delete this address?')) {
                $.ajax({
                    url: `${API_BASE}/addresses/my/${id}`,
                    method: 'DELETE',
                    headers: authHeaders()
                }).done(function () {
                    showToast('Address deleted');
                    loadAddresses();
                }).fail(function () {
                    showToast('Failed to delete address', 'error');
                });
            }
        });

        $(document).on('click', '.set-default-btn', function () {
            const id = $(this).data('id');
            $.ajax({
                url: `${API_BASE}/addresses/my/${id}/default`,
                method: 'PUT',
                headers: authHeaders()
            }).done(function () {
                showToast('Default address updated');
                loadAddresses();
            }).fail(function () {
                showToast('Failed to set default', 'error');
            });
        });

        // --- Modal ---
        function openModal() {
            $('#add-modal').removeClass('hidden').addClass('flex');
            setTimeout(() => {
                $('#add-modal-content').removeClass('scale-95 opacity-0').addClass('scale-100 opacity-100');
            }, 10);
            $('#address-form')[0].reset();
            $('#modal-error').addClass('hidden').text('');
        }
        function closeModal() {
            $('#add-modal-content').removeClass('scale-100 opacity-100').addClass('scale-95 opacity-0');
            setTimeout(() => {
                $('#add-modal').removeClass('flex').addClass('hidden');
            }, 200);
        }

        $('#open-add-modal-btn').on('click', openModal);
        $('#close-modal-btn, #cancel-modal-btn').on('click', closeModal);
        
        // --- Add Form Submit ---
        $('#address-form').on('submit', function (e) {
            e.preventDefault();
            const btn = $('#save-address-btn');
            btn.prop('disabled', true).text('Saving...');
            $('#modal-error').addClass('hidden');

            const payload = {
                address_line: $('#address_line').val().trim(),
                city: $('#city').val().trim(),
                zipcode: $('#zipcode').val().trim(),
                is_default: $('#is_default').is(':checked')
            };

            $.ajax({
                url: `${API_BASE}/addresses/my`,
                method: 'POST',
                headers: authHeaders(),
                contentType: 'application/json',
                data: JSON.stringify(payload)
            }).done(function () {
                showToast('Address added successfully');
                closeModal();
                loadAddresses();
            }).fail(function (xhr) {
                $('#modal-error').removeClass('hidden').text(xhr.responseJSON?.error || 'Error saving address');
            }).always(function () {
                btn.prop('disabled', false).text('Save Address');
            });
        });
        
        /* ── header logic ────────────────────────────────────────── */
        $('#profile-btn').on('click', () => window.location.href = isSignedIn() ? 'profile.html' : 'login.html');

        function loadCategories() {
            $.ajax({ url: `${API_BASE}/categories`, method: 'GET' })
            .done(function (res) {
                const cats = res.rows || [];
                const $navList = $('#nav-category-list').empty();
                cats.forEach(function (cat) {
                    $navList.append(
                        `<a href="shop.html?category=${encodeURIComponent(cat.name)}" class="block px-4 py-2.5 text-xs text-gray-500 font-medium hover:bg-gray-50 hover:text-gray-900 transition">${cat.name}</a>`
                    );
                });
            });
        }
        loadCategories();

        $('#search-input').on('keypress', function (e) {
            if (e.which === 13) {
                const query = $(this).val().trim();
                if (query) {
                    window.location.href = `shop.html?search=${encodeURIComponent(query)}`;
                } else {
                    window.location.href = 'shop.html';
                }
            }
        });

        updateCartBadge();
        loadAddresses();
    });
    </script>
</body>
</html>
