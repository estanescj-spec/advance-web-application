<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - MacSphere</title>
    <meta name="description" content="Review the items in your MacSphere shopping cart before checking out.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 9999;
            min-width: 220px;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.13);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
        }
        #toast.show    { opacity: 1; transform: translateY(0); }
        #toast.success { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
        #toast.error    { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }

        /* Cart row */
        .cart-row { transition: background 0.15s; }
        .cart-row:hover { background: #f8fafc; }

        /* Qty control */
        .qty-control input[type=number]::-webkit-inner-spin-button,
        .qty-control input[type=number]::-webkit-outer-spin-button { opacity: 0; }
        .qty-control input { -moz-appearance: textfield; }

        /* Spinner overlay on row */
        .row-loading { opacity: 0.5; pointer-events: none; transition: opacity 0.2s; }

        /* Checkout btn */
        #checkout-btn { transition: background 0.18s, transform 0.15s; }
        #checkout-btn:active { transform: scale(0.97); }
        #checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen w-screen overflow-y-auto m-0 p-0">

    <div id="toast"><i id="toast-icon"></i><span id="toast-msg"></span></div>

    <div class="w-full min-h-screen flex flex-col">

        <header class="bg-white/90 backdrop-blur-md py-5 px-10 w-full z-30 border-b border-gray-100/50 shadow-[0_4px_30px_rgba(0,0,0,0.03)] sticky top-0">
            <div class="max-w-[1440px] mx-auto flex items-center justify-between w-full space-x-8">

                <div class="flex items-center space-x-3 shrink-0 cursor-pointer" id="brand-logo">
                    <svg class="w-7 h-7 text-black stroke-current fill-none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        <path d="M3.6 9h16.8"/><path d="M3.6 15h16.8"/>
                    </svg>
                    <div class="text-2xl font-semibold text-[#0f172a] tracking-tight">MACSPHERE</div>
                </div>

                <div class="flex items-center space-x-7 text-gray-700 shrink-0">
                    <button id="profile-btn" class="hover:text-black transition text-lg" title="Profile">
                        <i class="fa-regular fa-user"></i>
                    </button>
                    <button id="cart-btn" class="flex items-center space-x-1.5 text-[#2a52be] font-semibold relative" title="Cart">
                        <i class="fa-solid fa-shopping-bag text-lg"></i>
                        <span id="cart-count" class="text-sm">0</span>
                    </button>
                    <button id="auth-btn" class="bg-[#2a52be] hover:bg-[#1f3d90] text-white font-medium text-sm px-7 py-2.5 rounded-full shadow-md shadow-blue-600/10 transition-all transform active:scale-95 flex items-center space-x-2">
                        <i class="fa-solid fa-right-to-bracket"></i>
                        <span>Sign In</span>
                    </button>
                </div>

            </div>
        </header>

        <section class="bg-white border-b border-slate-100 px-10 py-8">
            <div class="max-w-[1440px] mx-auto">
                <p class="text-xs uppercase tracking-[0.2em] font-bold text-[#2a52be] mb-1">Checkout</p>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">My Cart</h1>
            </div>
        </section>

        <main class="flex-1 max-w-[1440px] mx-auto w-full px-10 py-10">

            <div id="cart-loading" class="text-center py-24">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl text-[#2a52be] opacity-40"></i>
            </div>

            <div id="cart-empty" class="hidden text-center py-24">
                <i class="fa-solid fa-bag-shopping text-6xl text-slate-200 mb-5"></i>
                <h2 class="text-xl font-bold text-slate-400 mb-2">Your cart is empty</h2>
                <p class="text-slate-400 text-sm mb-6">Browse our catalog and add some items!</p>
                <a href="shop.html" class="inline-flex items-center gap-2 bg-[#2a52be] hover:bg-[#1f3d90] text-white font-semibold px-8 py-3 rounded-xl transition text-sm shadow-md">
                    <i class="fa-solid fa-store text-xs"></i> Start Shopping
                </a>
            </div>

            <div id="cart-content" class="hidden lg:grid lg:grid-cols-3 gap-8">

                <div class="lg:col-span-2">
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <input type="checkbox" id="select-all-checkbox" class="w-4 h-4 accent-[#2a52be] cursor-pointer" checked>
                                <h2 class="font-bold text-lg text-slate-900">Cart Items</h2>
                            </div>
                            <button id="clear-cart-btn" class="text-xs text-red-500 hover:text-red-700 font-medium flex items-center gap-1.5 transition">
                                <i class="fa-solid fa-trash-can"></i> Clear Cart
                            </button>
                        </div>

                        <div id="cart-items-list"></div>
                    </div>

                    <div class="mt-4">
                        <a href="shop.html" class="inline-flex items-center gap-2 text-[#2a52be] text-sm font-medium hover:underline">
                            <i class="fa-solid fa-arrow-left text-xs"></i> Continue Shopping
                        </a>
                    </div>
                </div>

                <div class="lg:col-span-1">
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 sticky top-24">
                        <h2 class="font-bold text-lg text-slate-900 mb-6">Order Summary</h2>

                        <div class="space-y-3 text-sm" id="summary-lines"></div>

                        <div class="border-t border-slate-100 mt-4 pt-4">
                            <div class="flex items-center justify-between">
                                <span class="font-bold text-slate-900 text-base">Total</span>
                                <span id="summary-total" class="font-extrabold text-xl text-[#2a52be]">₱0.00</span>
                            </div>
                        </div>

                        <button id="checkout-btn" class="mt-6 w-full bg-[#2a52be] hover:bg-[#1f3d90] text-white font-bold py-4 rounded-xl text-sm shadow-md flex items-center justify-center gap-2">
                            <i class="fa-solid fa-lock text-xs"></i> Proceed to Checkout
                        </button>

                        <div class="mt-4 flex items-center justify-center gap-2 text-xs text-slate-400">
                            <i class="fa-solid fa-shield-halved"></i>
                            <span>Secure &amp; encrypted checkout</span>
                        </div>
                    </div>
                </div>

            </div></main>

        <footer class="bg-white py-6 px-10 border-t border-gray-100 mt-auto">
            <div class="max-w-[1440px] mx-auto text-center text-gray-400 text-xs">
                &copy; 2024 MacSphere &mdash; All Rights Reserved
            </div>
        </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/config.js"></script>
    <script>
    $(document).ready(function () {

        /* ── helpers ──────────────────────────────────────────────── */
        function getToken() { return localStorage.getItem('token'); }
        function isSignedIn() { return !!getToken(); }
        function authHeaders() { return { Authorization: `Bearer ${getToken()}` }; }
        function phpCurrency(n) {
            return parseFloat(n).toLocaleString('en-PH', { style: 'currency', currency: 'PHP' });
        }

        /* ── toast ────────────────────────────────────────────────── */
        let toastTimer;
        function showToast(msg, type = 'success') {
            const $t = $('#toast');
            $t.removeClass('success error show');
            $('#toast-icon').attr('class', type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark');
            $('#toast-msg').text(msg);
            $t.addClass(type).addClass('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => $t.removeClass('show'), 3000);
        }

        /* ── redirect if not logged in ────────────────────────────── */
        if (!isSignedIn()) {
            window.location.href = 'login.html';
            return;
        }

        /* ── auth button ──────────────────────────────────────────── */
        function updateAuthBtn() {
            const btn = $('#auth-btn');
            if (isSignedIn()) {
                btn.html('<i class="fa-solid fa-right-from-bracket"></i> <span>Log Out</span>');
                btn.removeClass('bg-[#2a52be] hover:bg-[#1f3d90]').addClass('bg-red-600 hover:bg-red-700');
            } else {
                btn.html('<i class="fa-solid fa-right-to-bracket"></i> <span>Sign In</span>');
                btn.removeClass('bg-red-600 hover:bg-red-700').addClass('bg-[#2a52be] hover:bg-[#1f3d90]');
            }
        }

        $('#auth-btn').on('click', function () {
            if (isSignedIn()) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            } else {
                window.location.href = 'login.html';
            }
        });

        $('#cart-btn').on('click', () => window.location.href = 'cart.html');
        $('#profile-btn').on('click', () => window.location.href = 'profile.html');

        /* ── state ────────────────────────────────────────────────── */
        let cartItems = [];
        let selectedIds = new Set();

        /* ── load cart ────────────────────────────────────────────── */
        function loadCart() {
            $('#cart-loading').show();
            $('#cart-empty').addClass('hidden');
            $('#cart-content').addClass('hidden');

            $.ajax({ url: `${API_BASE}/cart`, method: 'GET', headers: authHeaders() })
            .done(function (res) {
                cartItems = res.rows || [];
                selectedIds = new Set(cartItems.map(i => i.id)); // all selected by default
                renderCart();
            })
            .fail(function () {
                $('#cart-loading').hide();
                showToast('Failed to load cart.', 'error');
            });
        }

        /* ── render ───────────────────────────────────────────────── */
        function renderCart() {
            $('#cart-loading').hide();

            if (!cartItems.length) {
                $('#cart-empty').removeClass('hidden');
                $('#cart-content').addClass('hidden');
                updateCartBadge();
                return;
            }

            $('#cart-empty').addClass('hidden');
            $('#cart-content').removeClass('hidden');

            const $list = $('#cart-items-list').empty();

            cartItems.forEach(function (item) {
                const p     = item.Product || {};
                const price = parseFloat(p.sell_price || 0);
                const qty   = item.quantity;
                const sub   = price * qty;
                const imgSrc = p.img_path
                    ? `${API_BASE.replace('/api/v1', '')}/${p.img_path}`
                    : 'https://placehold.co/120x90/f1f5f9/94a3b8?text=?';

                $list.append(`
                <div class="cart-row flex items-center gap-4 px-6 py-5 border-b border-slate-100 last:border-b-0" id="row-${item.id}">
                    <input type="checkbox" class="item-checkbox w-4 h-4 accent-[#2a52be] cursor-pointer shrink-0" data-cart-id="${item.id}" ${selectedIds.has(item.id) ? 'checked' : ''}>
                    <img src="${imgSrc}" alt="${p.name || 'Product'}"
                         class="w-20 h-16 object-contain bg-slate-50 rounded-xl p-2 shrink-0"
                         onerror="this.src='https://placehold.co/120x90/f1f5f9/94a3b8?text=?'">

                    <div class="flex-1 min-w-0">
                        <h3 class="font-semibold text-slate-900 text-sm truncate">${p.name || 'Unknown Product'}</h3>
                        <div class="flex flex-wrap gap-1.5 mt-1">
                            ${p.color  ? `<span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">${p.color}</span>` : ''}
                            ${p.storage ? `<span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">${p.storage}</span>` : ''}
                        </div>
                        <p class="text-xs text-slate-400 mt-1">${phpCurrency(price)} each</p>
                    </div>

                    <div class="qty-control flex items-center border border-slate-200 rounded-xl overflow-hidden shrink-0">
                        <button class="qty-dec-btn px-3 py-2 text-slate-500 hover:bg-slate-100 text-sm transition" data-cart-id="${item.id}" data-qty="${qty}">−</button>
                        <span class="qty-display w-8 text-center text-sm font-semibold select-none">${qty}</span>
                        <button class="qty-inc-btn px-3 py-2 text-slate-500 hover:bg-slate-100 text-sm transition" data-cart-id="${item.id}" data-qty="${qty}" data-max="${p.stock_quantity || 99}">+</button>
                    </div>

                    <div class="text-right shrink-0 w-28">
                        <div class="font-bold text-slate-900 text-sm" id="sub-${item.id}">${phpCurrency(sub)}</div>
                        <button class="remove-btn mt-1 text-[11px] text-red-400 hover:text-red-600 transition" data-cart-id="${item.id}">
                            <i class="fa-solid fa-trash-can mr-1"></i>Remove
                        </button>
                    </div>
                </div>`);
            });

            renderSummary();
            updateCartBadge();
        }

        /* ── summary ──────────────────────────────────────────────── */
        function renderSummary() {
            const $lines = $('#summary-lines').empty();
            let total = 0;

            cartItems.forEach(function (item) {
                if (!selectedIds.has(item.id)) return;

                const p   = item.Product || {};
                const sub = parseFloat(p.sell_price || 0) * item.quantity;
                total += sub;
                $lines.append(`
                <div class="flex items-start justify-between gap-2">
                    <span class="text-slate-500 leading-snug text-xs">${p.name || 'Item'} × ${item.quantity}</span>
                    <span class="font-medium text-slate-800 shrink-0">${phpCurrency(sub)}</span>
                </div>`);
            });

            $('#summary-total').text(phpCurrency(total));
        }

        /* ── checkbox handlers ────────────────────────────────────── */
        $(document).on('change', '.item-checkbox', function () {
            const cartId = $(this).data('cart-id');
            if ($(this).is(':checked')) {
                selectedIds.add(cartId);
            } else {
                selectedIds.delete(cartId);
            }
            renderSummary();
        });

        $('#select-all-checkbox').on('change', function () {
            const checked = $(this).is(':checked');
            if (checked) {
                selectedIds = new Set(cartItems.map(i => i.id));
            } else {
                selectedIds.clear();
            }
            $('.item-checkbox').prop('checked', checked);
            renderSummary();
        });

        /* ── cart badge ───────────────────────────────────────────── */
        function updateCartBadge() {
            const total = cartItems.reduce((s, i) => s + i.quantity, 0);
            $('#cart-count').text(total);
        }

        /* ── update quantity ──────────────────────────────────────── */
        function updateQty(cartId, newQty) {
            const $row = $(`#row-${cartId}`);
            $row.addClass('row-loading');

            $.ajax({
                url: `${API_BASE}/cart/${cartId}`,
                method: 'PUT',
                headers: authHeaders(),
                contentType: 'application/json',
                data: JSON.stringify({ quantity: newQty })
            }).done(function () {
                const idx = cartItems.findIndex(i => i.id === cartId);
                if (idx !== -1) {
                    cartItems[idx].quantity = newQty;
                    const price = parseFloat(cartItems[idx].Product?.sell_price || 0);
                    $row.find('.qty-display').text(newQty);
                    $row.find('.qty-dec-btn, .qty-inc-btn').data('qty', newQty);
                    $row.find(`#sub-${cartId}`).text(phpCurrency(price * newQty));
                    renderSummary();
                    updateCartBadge();
                }
            }).fail(function (xhr) {
                showToast(xhr.responseJSON?.error || 'Could not update quantity.', 'error');
            }).always(function () {
                $row.removeClass('row-loading');
            });
        }

        $(document).on('click', '.qty-dec-btn', function () {
            const cartId = $(this).data('cart-id');
            const qty    = parseInt($(this).data('qty'));
            if (qty <= 1) return;
            updateQty(cartId, qty - 1);
        });

        $(document).on('click', '.qty-inc-btn', function () {
            const cartId = $(this).data('cart-id');
            const qty    = parseInt($(this).data('qty'));
            const max    = parseInt($(this).data('max'));
            if (qty >= max) { showToast('Maximum stock reached.', 'error'); return; }
            updateQty(cartId, qty + 1);
        });

        /* ── remove item ──────────────────────────────────────────── */
        $(document).on('click', '.remove-btn', function () {
            const cartId = $(this).data('cart-id');
            const $row   = $(`#row-${cartId}`);
            $row.addClass('row-loading');

            $.ajax({
                url: `${API_BASE}/cart/${cartId}`,
                method: 'DELETE',
                headers: authHeaders()
            }).done(function () {
                cartItems = cartItems.filter(i => i.id !== cartId);
                selectedIds.delete(cartId);
                $row.slideUp(200, function () { $(this).remove(); });
                showToast('Item removed from cart.', 'success');
                renderSummary();
                updateCartBadge();
                if (!cartItems.length) {
                    $('#cart-content').addClass('hidden');
                    $('#cart-empty').removeClass('hidden');
                }
            }).fail(function (xhr) {
                $row.removeClass('row-loading');
                showToast(xhr.responseJSON?.error || 'Could not remove item.', 'error');
            });
        });

        /* ── clear cart ───────────────────────────────────────────── */
        $('#clear-cart-btn').on('click', function () {
            if (!cartItems.length) return;
            if (!confirm('Remove all items from your cart?')) return;

            $.ajax({ url: `${API_BASE}/cart`, method: 'DELETE', headers: authHeaders() })
            .done(function () {
                cartItems = [];
                selectedIds.clear();
                showToast('Cart cleared.', 'success');
                $('#cart-content').addClass('hidden');
                $('#cart-empty').removeClass('hidden');
                updateCartBadge();
            })
            .fail(function () { showToast('Could not clear cart.', 'error'); });
        });

        /* ── checkout ─────────────────────────────────────────────── */
        $('#checkout-btn').on('click', function () {
            if (!selectedIds.size) {
                showToast('Please select at least one item.', 'error');
                return;
            }
            sessionStorage.setItem('checkoutCartIds', JSON.stringify([...selectedIds]));
            window.location.href = 'checkout.html';
        });

        /* ── init ────────────────────────────────────────────────── */
        updateAuthBtn();
        loadCart();
        
        /* ── header link handling ────────────────────────────────── */
        $('#profile-btn').off('click').on('click', () => window.location.href = isSignedIn() ? 'profile.html' : 'login.html');
        $('#brand-logo').on('click', () => window.location.href = 'home.html');

    });
    </script>
</body>
</html>
