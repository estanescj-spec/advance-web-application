<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - MacSphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-white via-[#f8fafc] to-[#f1f5f9] min-h-screen w-screen m-0 p-0 flex flex-col">

    <header class="py-6 px-24 w-full">
        <div class="max-w-[1440px] mx-auto flex items-center space-x-3 cursor-pointer" id="brand-logo">
            <svg class="w-7 h-7 text-black stroke-current fill-none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M2 12h20" />
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                <path d="M3.6 9h16.8" />
                <path d="M3.6 15h16.8" />
            </svg>
            <div class="text-2xl font-semibold text-[#0f172a] tracking-tight">MACSPHERE</div>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 pb-24">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-10">
            <h1 class="text-2xl font-extrabold text-gray-900 mb-1">Welcome back</h1>
            <p class="text-gray-500 text-sm mb-8">Sign in to continue to MacSphere</p>

            <div id="error-box" class="hidden mb-5 bg-red-50 border border-red-200 text-red-600 text-xs font-medium px-4 py-3 rounded-lg"></div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Email</label>
                    <input type="email" id="email" required class="w-full bg-gray-50 text-sm text-gray-800 px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-[#2a52be] focus:bg-white transition" placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Password</label>
                    <input type="password" id="password" required class="w-full bg-gray-50 text-sm text-gray-800 px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-[#2a52be] focus:bg-white transition" placeholder="••••••••">
                </div>

                <button type="submit" id="login-submit" class="w-full bg-[#2a52be] hover:bg-[#1f3d90] text-white font-medium text-sm py-3.5 rounded-lg shadow-md shadow-blue-600/20 transition-all transform active:scale-95">
                    Sign In
                </button>
            </form>

            <p class="text-center text-xs text-gray-500 mt-6">
                Don't have an account?
                <a href="register.html" class="text-[#2a52be] font-semibold hover:underline">Create one</a>
            </p>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/config.js"></script>
    <script>
        $(document).ready(function () {

            // if already logged in, skip this page
            if (localStorage.getItem('token')) {
                window.location.href = 'home.html';
            }

            $('#brand-logo').on('click', function () { window.location.href = 'home.html'; });

            function showError(message) {
                $('#error-box').text(message).removeClass('hidden');
            }

            function hideError() {
                $('#error-box').addClass('hidden').text('');
            }

            $('#login-form').on('submit', function (e) {
                e.preventDefault();
                hideError();

                const email = $('#email').val().trim();
                const password = $('#password').val();
                const submitBtn = $('#login-submit');

                submitBtn.prop('disabled', true).text('Signing in...');

                $.ajax({
                    url: `${API_BASE}/users/login`,
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ email, password })
                }).done(function (res) {
                    localStorage.setItem('token', res.token);
                    localStorage.setItem('user', JSON.stringify(res.user));
                    window.location.href = res.user.role === 'admin' ? 'admin.html' : 'home.html';
                }).fail(function (xhr) {
                    const message = xhr.responseJSON?.message || 'Something went wrong. Please try again.';
                    showError(message);
                    submitBtn.prop('disabled', false).text('Sign In');
                });
            });
        });
    </script>
</body>
</html>
