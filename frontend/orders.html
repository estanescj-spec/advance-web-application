<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - MacSphere</title>
    <meta name="description" content="View your past orders.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link.active {
            background: #f8fafc;
            color: #2a52be;
            font-weight: 600;
            border-left: 3px solid #2a52be;
        }
        .sidebar-link:not(.active):hover {
            background: #f8fafc;
            color: #1e293b;
            border-left: 3px solid #e2e8f0;
        }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen w-screen overflow-y-auto m-0 p-0">

    <div class="w-full min-h-screen flex flex-col">

        <header class="bg-white/90 backdrop-blur-md py-5 px-10 w-full z-30 border-b border-gray-100/50 shadow-[0_4px_30px_rgba(0,0,0,0.03)] sticky top-0">
            <div class="max-w-[1440px] mx-auto flex items-center justify-between w-full space-x-8">

                <div class="flex items-center space-x-3 shrink-0 cursor-pointer" id="brand-logo">
                    <svg class="w-7 h-7 text-black stroke-current fill-none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        <path d="M3.6 9h16.8"/><path d="M3.6 15h16.8"/>
                    </svg>
                    <div class="text-2xl font-semibold text-[#0f172a] tracking-tight">MACSPHERE</div>
                </div>

                <div class="flex-1 flex items-center justify-start">
                    <a href="shop.html" class="flex items-center space-x-2 text-slate-600 hover:text-black font-medium text-sm transition-colors py-2 px-4 rounded-xl hover:bg-slate-50">
                        <i class="fa-solid fa-arrow-left text-xs"></i>
                        <span>Back to Shop</span>
                    </a>
                </div>

                <div class="flex items-center space-x-7 text-gray-700 shrink-0">
                    <button id="profile-btn" class="hover:text-black transition text-lg" title="Profile">
                        <i class="fa-regular fa-user"></i>
                    </button>
                    <button id="cart-btn" class="flex items-center space-x-1.5 hover:text-black transition text-gray-800 relative" title="Cart">
                        <i class="fa-solid fa-shopping-bag text-lg"></i>
                        <span id="cart-count" class="text-sm font-normal">0</span>
                    </button>
                    <button id="auth-btn" class="bg-red-600 hover:bg-red-700 text-white font-medium text-sm px-7 py-2.5 rounded-full shadow-md shadow-blue-600/10 transition-all transform active:scale-95 flex items-center space-x-2">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span>Log Out</span>
                    </button>
                </div>

            </div>
        </header>

        <main class="flex-1 max-w-[1440px] mx-auto w-full px-10 py-10">
            <div class="flex flex-col lg:flex-row gap-8">
                
                <aside class="w-full lg:w-64 shrink-0">
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden py-3">
                        <a href="profile.html" class="sidebar-link block px-6 py-3 text-sm text-slate-600 border-l-[3px] border-transparent">
                            <i class="fa-solid fa-id-card w-6"></i> Account Details
                        </a>
                        <a href="orders.html" class="sidebar-link active block px-6 py-3 text-sm text-slate-600 border-l-[3px] border-transparent">
                            <i class="fa-solid fa-box w-6"></i> Order History
                        </a>
                        <a href="addresses.html" class="sidebar-link block px-6 py-3 text-sm text-slate-600 border-l-[3px] border-transparent">
                            <i class="fa-solid fa-map-location-dot w-6"></i> Addresses
                        </a>
                    </div>
                </aside>

                <div class="flex-1 bg-white rounded-2xl border border-slate-100 shadow-sm p-8 relative min-h-[400px]">
                    
                    <div id="loading" class="absolute inset-0 bg-white/80 z-10 flex items-center justify-center rounded-2xl">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-[#2a52be]"></i>
                    </div>

                    <h1 class="text-2xl font-bold text-slate-900 mb-1">Order History</h1>
                    <p class="text-sm text-slate-500 mb-8">View and track your past orders.</p>

                    <div id="orders-container" class="space-y-6">
                        </div>
                    
                    <div id="no-orders" class="hidden text-center py-16">
                        <i class="fa-solid fa-box-open text-4xl text-slate-200 mb-3"></i>
                        <h3 class="text-lg font-medium text-slate-700">No orders yet</h3>
                        <p class="text-sm text-slate-500 mt-1">When you place an order, it will appear here.</p>
                        <a href="shop.html" class="inline-block mt-4 bg-slate-900 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-black transition">Start Shopping</a>
                    </div>
                </div>

            </div>
        </main>

        <footer class="bg-white py-6 px-10 border-t border-gray-100 mt-auto">
            <div class="max-w-[1440px] mx-auto text-center text-gray-400 text-xs">
                &copy; 2025 MacSphere &mdash; All Rights Reserved
            </div>
        </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/config.js"></script>
    <script>
    $(document).ready(function () {
        function getToken() { return localStorage.getItem('token'); }
        if (!getToken()) { window.location.href = 'login.html'; return; }
        function authHeaders() { return { Authorization: `Bearer ${getToken()}` }; }

        $('#auth-btn').on('click', function () {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        $('#cart-btn').on('click', () => window.location.href = 'cart.html');
        $('#brand-logo').on('click', () => window.location.href = 'home.html');


        function updateCartBadge() {
            $.ajax({ url: `${API_BASE}/cart`, method: 'GET', headers: authHeaders() })
            .done(function (res) {
                const total = (res.rows || []).reduce((s, i) => s + i.quantity, 0);
                $('#cart-count').text(total);
            }).fail(function () { $('#cart-count').text('0'); });
        }

        // --- Load Orders ---
        function loadOrders() {
            $('#loading').show();
            $.ajax({
                url: `${API_BASE}/orders/my`,
                method: 'GET',
                headers: authHeaders()
            }).done(function (res) {
                const orders = res.rows || [];
                const container = $('#orders-container');
                container.empty();
                
                if (orders.length === 0) {
                    $('#no-orders').removeClass('hidden');
                } else {
                    $('#no-orders').addClass('hidden');
                    
                    orders.forEach(order => {
                        let statusClass = 'bg-slate-100 text-slate-700';
                        if(order.status === 'completed') statusClass = 'bg-green-100 text-green-700';
                        if(order.status === 'pending') statusClass = 'bg-blue-100 text-[#2a52be]';
                        if(order.status === 'cancelled') statusClass = 'bg-red-100 text-red-700';
                        
                        let total = 0;
                        let itemsHtml = order.OrderLines.map(line => {
                            const p = line.Product;
                            const price = parseFloat(line.price_at_purchase);
                            total += (price * line.quantity);
                            const img = (p && p.images?.length)
                                ? `${API_BASE.replace('/api/v1', '')}/${p.images[0]}`
                                : 'https://placehold.co/96x96/e2e8f0/334155?text=No+Image';
                            const name = p ? p.name : 'Unknown Product';
                            
                            return `
                                <div class="flex items-center gap-4 py-3 border-t border-slate-100 first:border-0">
                                    <img src="${img}" class="w-12 h-12 rounded-lg object-cover bg-slate-100 border border-slate-200">
                                    <div class="flex-1">
                                        <div class="text-sm font-medium text-slate-800">${name}</div>
                                        <div class="text-xs text-slate-500">
                                            Qty: ${line.quantity} &times; ₱${price.toLocaleString()}
                                        </div>
                                        ${order.status === 'completed' ? `
                                        <button 
                                            class="review-btn mt-2 text-xs bg-[#2a52be] text-white px-3 py-1.5 rounded-lg"
                                            data-product-id="${p.id}">
                                            Write Review
                                        </button>
                                        ` : ''}
                                    </div>
                                    <div class="text-sm font-semibold text-slate-900">₱${(price * line.quantity).toLocaleString()}</div>
                                </div>
                            `;
                        }).join('');

                        container.append(`
                            <div class="border border-slate-200 rounded-2xl overflow-hidden bg-white shadow-sm hover:shadow transition-shadow">
                                <div class="bg-slate-50 px-5 py-4 border-b border-slate-200 flex flex-wrap justify-between items-center gap-4">
                                    <div>
                                        <div class="text-xs text-slate-500 font-medium uppercase tracking-wider mb-1">Order Placed</div>
                                        <div class="text-sm font-medium text-slate-800">${new Date(order.date_placed).toLocaleDateString()}</div>
                                    </div>
                                    <div>
                                        <div class="text-xs text-slate-500 font-medium uppercase tracking-wider mb-1">Total</div>
                                        <div class="text-sm font-medium text-slate-800">₱${total.toLocaleString()}</div>
                                    </div>
                                    <div class="text-right ml-auto flex items-end gap-3">
                                        <div>
                                            <div class="text-xs text-slate-500 font-medium uppercase tracking-wider mb-1">Order # ${order.id}</div>
                                            <span class="inline-flex px-2 py-0.5 rounded-full text-[11px] font-bold uppercase tracking-wider ${statusClass}">${order.status}</span>
                                        </div>
                                        ${order.status === 'pending' ? `
                                        <button 
                                            class="cancel-order-btn text-xs bg-white border border-red-300 text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-lg font-medium transition"
                                            data-order-id="${order.id}">
                                            Cancel Order
                                        </button>
                                        ` : ''}
                                    </div>
                                </div>
                                <div class="px-5 py-2">
                                    ${itemsHtml}
                                </div>
                            </div>
                        `);
                    });
                }
                $('#loading').fadeOut(200);
            }).fail(function () {
                $('#no-orders').removeClass('hidden').html('<p class="text-red-500">Failed to load orders.</p>');
                $('#loading').fadeOut(200);
            });
        }

        /* ── header logic ────────────────────────────────────────── */
        $('#profile-btn').on('click', () => window.location.href = getToken() ? 'profile.html' : 'login.html');
        $(document).on('click','.review-btn',function(){

            const productId = $(this).data('product-id');

            window.location.href = `shop.html?review=${productId}`;

        });
        $(document).on('click', '.cancel-order-btn', function () {
            const $btn = $(this);
            if ($btn.prop('disabled')) return; // guard against double-fire

            const orderId = $btn.data('order-id');
            if (!confirm('Are you sure you want to cancel this order?')) return;

            $btn.prop('disabled', true).text('Cancelling...');

            $.ajax({
                url: `${API_BASE}/orders/${orderId}/cancel`,
                method: 'PUT',
                headers: authHeaders()
            }).done(function () {
                loadOrders();
            }).fail(function (xhr) {
                alert(xhr.responseJSON?.message || xhr.responseJSON?.error || 'Failed to cancel order.');
                $btn.prop('disabled', false).text('Cancel Order');
            });
        });
        updateCartBadge();
        loadOrders();
    });
    </script>
</body>
</html>
