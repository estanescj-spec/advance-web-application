<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - MacSphere</title>
    <meta name="description" content="Manage your MacSphere account details and profile.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 9999;
            min-width: 220px;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.13);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
        }
        #toast.show   { opacity: 1; transform: translateY(0); }
        #toast.success { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
        #toast.error   { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
        
        .sidebar-link {
            transition: all 0.2s;
        }
        .sidebar-link.active {
            background: #f8fafc;
            color: #2a52be;
            font-weight: 600;
            border-left: 3px solid #2a52be;
        }
        .sidebar-link:not(.active):hover {
            background: #f8fafc;
            color: #1e293b;
            border-left: 3px solid #e2e8f0;
        }
        
        .dropdown:hover .dropdown-menu { display: block; }
        
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen w-screen overflow-y-auto m-0 p-0">

    <!-- TOAST -->
    <div id="toast"><i id="toast-icon"></i><span id="toast-msg"></span></div>

    <div class="w-full min-h-screen flex flex-col">

        <!-- HEADER -->
        <header class="bg-white/90 backdrop-blur-md py-5 px-10 w-full z-30 border-b border-gray-100/50 shadow-[0_4px_30px_rgba(0,0,0,0.03)] sticky top-0">
            <div class="max-w-[1440px] mx-auto flex items-center justify-between w-full space-x-8">

                <div class="flex items-center space-x-3 shrink-0 cursor-pointer" id="brand-logo">
                    <svg class="w-7 h-7 text-black stroke-current fill-none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        <path d="M3.6 9h16.8"/><path d="M3.6 15h16.8"/>
                    </svg>
                    <div class="text-2xl font-semibold text-[#0f172a] tracking-tight">MACSPHERE</div>
                </div>

                <div class="flex items-center space-x-8 flex-1 max-w-2xl">
                    <div class="relative dropdown shrink-0">
                        <button class="flex items-center space-x-1.5 text-gray-700 font-medium text-xs tracking-wide uppercase hover:text-black transition py-2">
                            <span>Categories</span>
                            <i class="fa-solid fa-chevron-down text-[10px]"></i>
                        </button>
                        <div id="category-dropdown-menu" class="dropdown-menu hidden absolute left-0 mt-0 w-44 bg-white border border-gray-100 rounded-xl shadow-xl py-2 z-40">
                            <a href="home.html" class="block px-4 py-2.5 text-xs text-gray-900 font-semibold hover:bg-gray-50 transition">Home</a>
                            <div id="nav-category-list" class="text-xs text-gray-400 px-4 py-2">Loading...</div>
                        </div>
                    </div>

                    <div class="relative flex-1">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-gray-400 text-sm">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <input type="text" id="search-input" placeholder="Search products..." class="w-full bg-gray-50 text-xs font-medium text-gray-800 placeholder-gray-400 pl-10 pr-4 py-2.5 rounded-full border border-gray-100 focus:outline-none focus:border-blue-200 focus:bg-white transition">
                    </div>
                </div>

                <div class="flex items-center space-x-7 text-gray-700 shrink-0">
                    <button id="profile-btn" class="hover:text-black transition text-lg" title="Profile">
                        <i class="fa-regular fa-user"></i>
                    </button>
                    <button id="cart-btn" class="flex items-center space-x-1.5 hover:text-black transition text-gray-800 relative" title="Cart">
                        <i class="fa-solid fa-shopping-bag text-lg"></i>
                        <span id="cart-count" class="text-sm font-normal">0</span>
                    </button>
                    <button id="auth-btn" class="bg-red-600 hover:bg-red-700 text-white font-medium text-sm px-7 py-2.5 rounded-full shadow-md shadow-blue-600/10 transition-all transform active:scale-95 flex items-center space-x-2">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span>Log Out</span>
                    </button>
                </div>

            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main class="flex-1 max-w-[1440px] mx-auto w-full px-10 py-10">
            <div class="flex flex-col lg:flex-row gap-8">
                
                <!-- SIDEBAR -->
                <aside class="w-full lg:w-64 shrink-0">
                    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden py-3">
                        <a href="#" class="sidebar-link active block px-6 py-3 text-sm text-slate-600 border-l-[3px] border-transparent">
                            <i class="fa-solid fa-id-card w-6"></i> Account Details
                        </a>
                        <!-- Placeholders for future pages -->
                        <a href="orders.html" class="sidebar-link block px-6 py-3 text-sm text-slate-600 border-l-[3px] border-transparent">
                            <i class="fa-solid fa-box w-6"></i> Order History
                        </a>
                        <a href="addresses.html" class="sidebar-link block px-6 py-3 text-sm text-slate-600 border-l-[3px] border-transparent">
                            <i class="fa-solid fa-map-location-dot w-6"></i> Addresses
                        </a>
                    </div>
                </aside>

                <!-- CONTENT AREA -->
                <div class="flex-1 bg-white rounded-2xl border border-slate-100 shadow-sm p-8 relative">
                    
                    <!-- LOADING OVERLAY -->
                    <div id="profile-loading" class="absolute inset-0 bg-white/80 z-10 flex items-center justify-center rounded-2xl">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-[#2a52be]"></i>
                    </div>

                    <div class="max-w-2xl">
                        <h1 class="text-2xl font-bold text-slate-900 mb-2">Account Details</h1>
                        <p class="text-sm text-slate-500 mb-8">Update your personal information and contact details.</p>

                        <div id="error-box" class="hidden mb-6 bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-xl"></div>

                        <form id="profile-form" class="space-y-6">
                            
                            <!-- Email (Read-only) -->
                            <div>
                                <label class="block text-xs font-semibold text-slate-600 mb-1.5">Email Address</label>
                                <input type="text" id="email" disabled class="w-full bg-slate-50 text-slate-400 px-4 py-3 rounded-xl border border-slate-200 cursor-not-allowed">
                                <p class="text-xs text-slate-400 mt-1.5">Email cannot be changed once registered.</p>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <!-- Name -->
                                <div>
                                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">Full Name</label>
                                    <input type="text" id="name" class="w-full bg-white text-slate-900 px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-[#2a52be] transition">
                                </div>

                                <!-- Phone -->
                                <div>
                                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">Phone Number</label>
                                    <input type="text" id="phone" class="w-full bg-white text-slate-900 px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-[#2a52be] transition" placeholder="e.g. 09171234567">
                                </div>
                            </div>
                            
                            <!-- Display Role -->
                            <div>
                                <span class="inline-flex items-center gap-1.5 bg-slate-100 px-3 py-1.5 rounded-full text-xs font-medium text-slate-600 capitalize">
                                    <i class="fa-solid fa-user-tag text-[10px]"></i> <span id="role-badge">User</span>
                                </span>
                            </div>

                            <div class="pt-6 border-t border-slate-100">
                                <button type="submit" id="save-btn" class="bg-[#2a52be] hover:bg-[#1f3d90] text-white font-semibold py-3 px-8 rounded-xl shadow-md transition-all transform active:scale-95 flex items-center gap-2">
                                    <i class="fa-solid fa-floppy-disk text-sm"></i> Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </main>

        <!-- FOOTER -->
        <footer class="bg-white py-6 px-10 border-t border-gray-100 mt-auto">
            <div class="max-w-[1440px] mx-auto text-center text-gray-400 text-xs">
                &copy; 2025 MacSphere &mdash; All Rights Reserved
            </div>
        </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/config.js"></script>
    <script>
    $(document).ready(function () {

        /* ── helpers ──────────────────────────────────────────────── */
        function getToken() { return localStorage.getItem('token'); }
        function isSignedIn() { return !!getToken(); }
        function authHeaders() { return { Authorization: `Bearer ${getToken()}` }; }

        /* ── redirect if not logged in ────────────────────────────── */
        if (!isSignedIn()) {
            window.location.href = 'login.html';
            return;
        }

        /* ── toast & errors ───────────────────────────────────────── */
        let toastTimer;
        function showToast(msg, type = 'success') {
            const $t = $('#toast');
            $t.removeClass('success error show');
            $('#toast-icon').attr('class', type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark');
            $('#toast-msg').text(msg);
            $t.addClass(type).addClass('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => $t.removeClass('show'), 3000);
        }

        function showError(msg) {
            $('#error-box').text(msg).removeClass('hidden');
        }
        function hideError() {
            $('#error-box').addClass('hidden').text('');
        }

        /* ── auth ─────────────────────────────────────────────────── */
        $('#auth-btn').on('click', function () {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        $('#cart-btn').on('click', () => window.location.href = 'cart.html');
        $('#brand-logo').on('click', () => window.location.href = 'home.html');

        /* ── cart badge ───────────────────────────────────────────── */
        function updateCartBadge() {
            $.ajax({ url: `${API_BASE}/cart`, method: 'GET', headers: authHeaders() })
            .done(function (res) {
                const total = (res.rows || []).reduce((s, i) => s + i.quantity, 0);
                $('#cart-count').text(total);
            }).fail(function () { $('#cart-count').text('0'); });
        }

        /* ── load profile ─────────────────────────────────────────── */
        function loadProfile() {
            $.ajax({
                url: `${API_BASE}/users/me`,
                method: 'GET',
                headers: authHeaders()
            }).done(function (res) {
                const user = res.user;
                if (!user) {
                    showToast('Could not load profile.', 'error');
                    return;
                }
                
                $('#email').val(user.email);
                $('#name').val(user.name);
                $('#role-badge').text(user.role);
                
                // Get phone from CustomerProfile if it exists
                if (user.CustomerProfile && user.CustomerProfile.phone) {
                    $('#phone').val(user.CustomerProfile.phone);
                }

                $('#profile-loading').fadeOut(200);
            }).fail(function () {
                localStorage.removeItem('token');
                window.location.href = 'login.html';
            });
        }

        /* ── header logic ────────────────────────────────────────── */
        function loadCategories() {
            $.ajax({ url: `${API_BASE}/categories`, method: 'GET' })
            .done(function (res) {
                const cats = res.rows || [];
                const $navList = $('#nav-category-list').empty();
                cats.forEach(function (cat) {
                    $navList.append(
                        `<a href="shop.html?category=${encodeURIComponent(cat.name)}" class="block px-4 py-2.5 text-xs text-gray-500 font-medium hover:bg-gray-50 hover:text-gray-900 transition">${cat.name}</a>`
                    );
                });
            });
        }
        loadCategories();

        $('#search-input').on('keypress', function (e) {
            if (e.which === 13) {
                const query = $(this).val().trim();
                if (query) {
                    window.location.href = `shop.html?search=${encodeURIComponent(query)}`;
                } else {
                    window.location.href = 'shop.html';
                }
            }
        });

        /* ── submit update ────────────────────────────────────────── */
        $('#profile-form').on('submit', function (e) {
            e.preventDefault();
            hideError();

            const name = $('#name').val().trim();
            const phone = $('#phone').val().trim();
            const $btn = $('#save-btn');

            $btn.prop('disabled', true).html('<i class="fa-solid fa-circle-notch fa-spin text-sm"></i> Saving...');

            const payload = {};
            if (name) payload.name = name;
            // Phone can be empty to remove it
            payload.phone = phone;

            $.ajax({
                url: `${API_BASE}/users/me`,
                method: 'PUT',
                headers: authHeaders(),
                contentType: 'application/json',
                data: JSON.stringify(payload)
            }).done(function () {
                showToast('Profile updated successfully!', 'success');
                // Update local storage user name just in case it's used elsewhere
                try {
                    let userCache = JSON.parse(localStorage.getItem('user'));
                    if (userCache) {
                        userCache.name = name;
                        localStorage.setItem('user', JSON.stringify(userCache));
                    }
                } catch(e) {}
            }).fail(function (xhr) {
                const msg = xhr.responseJSON?.message || xhr.responseJSON?.error || 'Failed to update profile.';
                showError(msg);
            }).always(function () {
                $btn.prop('disabled', false).html('<i class="fa-solid fa-floppy-disk text-sm"></i> Save Changes');
            });
        });

        /* ── init ─────────────────────────────────────────────────── */
        updateCartBadge();
        loadProfile();
    });
    </script>
</body>
</html>
