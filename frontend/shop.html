<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - MacSphere</title>
    <meta name="description" content="Browse our full range of genuine Apple products — MacBooks, iPhones, iPads, and more at MacSphere.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 9999;
            min-width: 220px;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.13);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
        }
        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        #toast.success { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
        #toast.error   { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }

        /* Search Autocomplete Dropdown */
        #search-autocomplete {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 50;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: none;
        }
        #search-autocomplete.show {
            display: block;
        }
        .autocomplete-item {
            padding: 10px 16px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .autocomplete-item:hover {
            background: #f8fafc;
        }
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        .autocomplete-item img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            background: #f1f5f9;
            border-radius: 6px;
            padding: 4px;
        }
        .autocomplete-item-text {
            flex: 1;
            min-width: 0;
        }
        .autocomplete-item-name {
            font-weight: 600;
            font-size: 13px;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .autocomplete-item-price {
            font-size: 12px;
            color: #64748b;
        }
        .autocomplete-empty {
            padding: 16px;
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
        }

        /* Product card */
        .product-card {
            border-radius: 20px;
            border: 1px solid #f1f5f9;
            background: #fff;
            box-shadow: 0 2px 16px rgba(0,0,0,0.04);
            transition: box-shadow 0.22s ease, transform 0.22s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            box-shadow: 0 8px 36px rgba(42,82,190,0.10);
            transform: translateY(-3px);
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #f8fafc;
            padding: 24px;
        }
        .add-to-cart-btn {
            transition: background 0.18s, transform 0.15s;
        }
        .add-to-cart-btn:active { transform: scale(0.96); }
        .add-to-cart-btn.loading { opacity: 0.65; pointer-events: none; }

        /* Category pill */
        .cat-pill {
            cursor: pointer;
            border-radius: 999px;
            padding: 6px 18px;
            font-size: 13px;
            font-weight: 500;
            border: 1.5px solid #e2e8f0;
            background: #fff;
            color: #64748b;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .cat-pill.active, .cat-pill:hover {
            background: #2a52be;
            border-color: #2a52be;
            color: #fff;
        }

        .dropdown:hover .dropdown-menu { display: block; }
        
        .search-wrapper {
            position: relative;
        }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen w-screen overflow-y-auto m-0 p-0">

    <!-- TOAST -->
    <div id="toast"><i id="toast-icon"></i><span id="toast-msg"></span></div>

    <div class="w-full min-h-screen flex flex-col">

        <!-- HEADER -->
        <header class="bg-white/90 backdrop-blur-md py-5 px-10 w-full z-30 border-b border-gray-100/50 shadow-[0_4px_30px_rgba(0,0,0,0.03)] sticky top-0">
            <div class="max-w-[1440px] mx-auto flex items-center justify-between w-full space-x-8">

                <div class="flex items-center space-x-3 shrink-0 cursor-pointer" id="brand-logo">
                    <svg class="w-7 h-7 text-black stroke-current fill-none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        <path d="M3.6 9h16.8"/><path d="M3.6 15h16.8"/>
                    </svg>
                    <div class="text-2xl font-semibold text-[#0f172a] tracking-tight">MACSPHERE</div>
                </div>

                <div class="flex items-center space-x-8 flex-1 max-w-2xl">
                    <div class="relative dropdown shrink-0">
                        <button class="flex items-center space-x-1.5 text-gray-700 font-medium text-xs tracking-wide uppercase hover:text-black transition py-2">
                            <span>Categories</span>
                            <i class="fa-solid fa-chevron-down text-[10px]"></i>
                        </button>
                        <div id="category-dropdown-menu" class="dropdown-menu hidden absolute left-0 mt-0 w-44 bg-white border border-gray-100 rounded-xl shadow-xl py-2 z-40">
                            <a href="home.html" class="block px-4 py-2.5 text-xs text-gray-900 font-semibold hover:bg-gray-50 transition">Home</a>
                            <div id="nav-category-list" class="text-xs text-gray-400 px-4 py-2">Loading...</div>
                        </div>
                    </div>

                    <div class="search-wrapper flex-1">
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-gray-400 text-sm">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </span>
                            <input type="text" id="search-input" placeholder="Search products..." class="w-full bg-gray-50 text-xs font-medium text-gray-800 placeholder-gray-400 pl-10 pr-4 py-2.5 rounded-t-full border border-gray-100 border-b-0 focus:outline-none focus:border-blue-200 focus:bg-white transition">
                            <div id="search-autocomplete" class="autocomplete-empty">
                                Start typing to search...
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center space-x-7 text-gray-700 shrink-0">
                    <button id="profile-btn" class="hover:text-black transition text-lg" title="Profile">
                        <i class="fa-regular fa-user"></i>
                    </button>
                    <button id="cart-btn" class="flex items-center space-x-1.5 hover:text-black transition text-gray-800 relative" title="Cart">
                        <i class="fa-solid fa-shopping-bag text-lg"></i>
                        <span id="cart-count" class="text-sm font-normal">0</span>
                    </button>
                    <button id="auth-btn" class="bg-[#2a52be] hover:bg-[#1f3d90] text-white font-medium text-sm px-7 py-2.5 rounded-full shadow-md shadow-blue-600/10 transition-all transform active:scale-95 flex items-center space-x-2">
                        <i class="fa-solid fa-right-to-bracket"></i>
                        <span>Sign In</span>
                    </button>
                </div>

            </div>
        </header>

        <!-- PAGE TITLE -->
        <section class="bg-white border-b border-slate-100 px-10 py-8">
            <div class="max-w-[1440px] mx-auto">
                <p class="text-xs uppercase tracking-[0.2em] font-bold text-[#2a52be] mb-1">Catalog</p>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Shop All Products</h1>
                <p class="text-slate-500 text-sm mt-1">Discover our full range of genuine Apple products.</p>
            </div>
        </section>

        <main class="flex-1 max-w-[1440px] mx-auto w-full px-10 py-8">

            <!-- FILTERS ROW -->
            <div class="flex flex-wrap items-center gap-3 mb-8">
                <div id="category-pills" class="flex flex-wrap gap-2">
                    <span class="cat-pill active" data-id="">All</span>
                </div>

                <div class="ml-auto flex items-center gap-3">
                    <select id="sort-select" class="border border-slate-200 rounded-xl px-4 py-2 text-sm bg-white text-slate-700 focus:outline-none">
                        <option value="newest">Newest</option>
                        <option value="price_asc">Price: Low → High</option>
                        <option value="price_desc">Price: High → Low</option>
                        <option value="name_asc">Name: A → Z</option>
                    </select>
                </div>
            </div>

            <!-- RESULTS COUNT -->
            <p id="results-count" class="text-xs text-slate-400 mb-5"></p>

            <!-- PRODUCT GRID -->
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

            <!-- EMPTY STATE -->
            <div id="product-empty" class="hidden text-center py-24">
                <i class="fa-solid fa-box-open text-5xl text-slate-200 mb-4"></i>
                <p class="text-slate-400 font-medium">No products found.</p>
            </div>

            <!-- LOADING STATE -->
            <div id="product-loading" class="text-center py-24">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl text-[#2a52be] opacity-40"></i>
            </div>

        </main>

        <!-- FOOTER -->
        <footer class="bg-white py-6 px-10 w-full border-t border-gray-100 mt-auto">
            <div class="max-w-[1440px] mx-auto text-center text-gray-400 text-xs">
                &copy; 2025 MacSphere &mdash; All Rights Reserved
            </div>
        </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/config.js"></script>
    <script>
    $(document).ready(function () {

        /* ── helpers ──────────────   ───────────────────────────────── */
        function getToken() { return localStorage.getItem('token'); }
        function isSignedIn() { return !!getToken(); }
        function authHeaders() { return { Authorization: `Bearer ${getToken()}` }; }

        /* ── toast ───────────────────────────────────────────────── */
        let toastTimer;
        function showToast(msg, type = 'success') {
            const $t = $('#toast');
            $t.removeClass('success error show');
            $('#toast-icon').attr('class', type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark');
            $('#toast-msg').text(msg);
            $t.addClass(type).addClass('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => $t.removeClass('show'), 3000);
        }

        /* ── auth button ─────────────────────────────────────────── */
        function updateAuthBtn() {
            const btn = $('#auth-btn');
            if (isSignedIn()) {
                btn.html('<i class="fa-solid fa-right-from-bracket"></i> <span>Log Out</span>');
                btn.removeClass('bg-[#2a52be] hover:bg-[#1f3d90]').addClass('bg-red-600 hover:bg-red-700');
            } else {
                btn.html('<i class="fa-solid fa-right-to-bracket"></i> <span>Sign In</span>');
                btn.removeClass('bg-red-600 hover:bg-red-700').addClass('bg-[#2a52be] hover:bg-[#1f3d90]');
            }
        }

        $('#auth-btn').on('click', function () {
            if (isSignedIn()) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                updateAuthBtn();
                updateCartCount();
            } else {
                window.location.href = 'login.html';
            }
        });

        /* ── cart count ──────────────────────────────────────────── */
        function updateCartCount() {
            if (!isSignedIn()) { $('#cart-count').text('0'); return; }
            $.ajax({
                url: `${API_BASE}/cart`,
                method: 'GET',
                headers: authHeaders()
            }).done(function (res) {
                const total = (res.rows || []).reduce((s, i) => s + i.quantity, 0);
                $('#cart-count').text(total);
            }).fail(function () { $('#cart-count').text('0'); });
        }

        $('#cart-btn').on('click', () => window.location.href = 'cart.html');
        $('#profile-btn').on('click', () => window.location.href = isSignedIn() ? 'profile.html' : 'login.html');
        $('#brand-logo').on('click', () => window.location.href = 'home.html');

        /* ── state ───────────────────────────────────────────────── */
        let currentPage = 1;
        const pageSize = 4;
        let hasMore = true;
        let loading = false;
        let activeCatId   = '';
        let searchQuery   = '';
        let sortValue     = 'newest';
        let allProducts = [];

        /* ── read URL params ─────────────────────────────────────── */
        const params = new URLSearchParams(window.location.search);
        if (params.get('search'))   searchQuery = params.get('search');
        if (params.get('category')) activeCatId = params.get('category');

        /* ── autocomplete search ─────────────────────────────────── */
        $('#search-input').on('input', function () {
            const query = $(this).val().trim();
            const $autocomplete = $('#search-autocomplete');

            if (query.length === 0) {
                $autocomplete.removeClass('show').html('<div class="autocomplete-empty">Start typing to search...</div>');
                return;
            }

            $.ajax({
                url: `${API_BASE}/products`,
                method: 'GET'
            }).done(function (res) {
                const products = res.rows || [];

                const queryLower = query.toLowerCase();

                const filtered = products.filter(p =>
                    (p.name || '').toLowerCase().includes(queryLower) ||
                    (p.description || '').toLowerCase().includes(queryLower)
                ).slice(0, 8);

                if (filtered.length === 0) {
                    $autocomplete.addClass('show').html('<div class="autocomplete-empty">No products found</div>');
                    return;
                }

                let html = '';
                filtered.forEach(product => {
                    const price = parseFloat(product.sell_price).toLocaleString('en-PH', { style: 'currency', currency: 'PHP' });
                    const imgSrc = product.images?.length
                        ? `${API_BASE.replace('/api/v1', '')}/${product.images[0]}`
                        : 'https://placehold.co/40x40/f1f5f9/94a3b8?text=No';

                    html += `
                    <div class="autocomplete-item" data-product-id="${product.id}">
                        <img src="${imgSrc}" alt="${product.name}" onerror="this.src='https://placehold.co/40x40/f1f5f9/94a3b8?text=No'">
                        <div class="autocomplete-item-text">
                            <div class="autocomplete-item-name">${product.name}</div>
                            <div class="autocomplete-item-price">${price}</div>
                        </div>
                    </div>`;
                });

                $autocomplete.addClass('show').html(html);
            }).fail(function () {
                $autocomplete.addClass('show').html('<div class="autocomplete-empty">Error loading results</div>');
            });
        });

        // Click on autocomplete item -> go straight to the product page
        $(document).on('click', '.autocomplete-item', function () {
            const productId = $(this).data('product-id');
            window.location.href = `product.html?id=${productId}`;
        });

        // Close autocomplete on escape
        $(document).on('keydown', function (e) {
            if (e.which === 27) {
                $('#search-autocomplete').removeClass('show');
            }
        });

        // Close autocomplete when clicking outside
        $(document).on('click', function (e) {
            if (!$(e.target).closest('.search-wrapper').length) {
                $('#search-autocomplete').removeClass('show');
            }
        });

        // Enter key to search all
        $('#search-input').on('keypress', function (e) {
            if (e.which === 13) {
                const query = $(this).val().trim();
                if (query) {
                    searchQuery = query;
                    $('#search-autocomplete').removeClass('show');
                    renderProducts();
                }
            }
        });

        /* ── categories ──────────────────────────────────────────── */
        function loadCategories() {
            $.ajax({ url: `${API_BASE}/categories`, method: 'GET' })
            .done(function (res) {
                const cats = res.rows || [];
                const $pills = $('#category-pills');
                const $navList = $('#nav-category-list').empty();

                cats.forEach(function (cat) {
                    const isActive = String(cat.id) === String(activeCatId) || cat.name === activeCatId;
                    const pill = $(`<span class="cat-pill${isActive ? ' active' : ''}" data-id="${cat.id}">${cat.name}</span>`);
                    $pills.append(pill);

                    $navList.append(
                        `<a href="shop.html?category=${encodeURIComponent(cat.name)}" class="block px-4 py-2.5 text-xs text-gray-500 font-medium hover:bg-gray-50 hover:text-gray-900 transition">${cat.name}</a>`
                    );

                    if (isActive) activeCatId = String(cat.id);
                });

                if (!activeCatId) $('#category-pills .cat-pill[data-id=""]').addClass('active');
            });
        }

        $(document).on('click', '.cat-pill', function () {
            activeCatId = $(this).data('id') ?? '';
            $('.cat-pill').removeClass('active');
            $(this).addClass('active');
            renderProducts();
        });

        /* ── load products ───────────────────────────────────────── */
        function loadProducts(reset = false) {
            if (loading || !hasMore) return;
            loading = true;
            if (reset) {
                currentPage = 1;
                hasMore = true;
                allProducts = [];
                $('#product-grid').empty();
            }
            $('#product-loading').show();
            $.ajax({
                url: `${API_BASE}/products?page=${currentPage}&limit=${pageSize}`,
                method: 'GET'
            })
            .done(function(res){
                const rows = res.rows || [];
                
                console.log("Current page:", currentPage);
                console.log("Returned:", rows.length);
                allProducts.push(...rows);
                renderProducts();
                currentPage++;

                if(rows.length < pageSize){
                    hasMore = false;
                    console.log("No more products");
                }
            })
            .always(function(){
                loading = false;
                $('#product-loading').hide();
            });
        }

        /* ── render & filter ─────────────────────────────────────── */
        function renderProducts() {
            let rows = allProducts.slice();

            if (activeCatId) {
                rows = rows.filter(p => {
                    const cats = p.Categories || p.categories || [];
                    return cats.some(c => String(c.id) === String(activeCatId));
                });
            }

            if (searchQuery.trim()) {
                const q = searchQuery.trim().toLowerCase();
                rows = rows.filter(p =>
                    (p.name || '').toLowerCase().includes(q) ||
                    (p.description || '').toLowerCase().includes(q)
                );
            }

            if (sortValue === 'price_asc')  rows.sort((a, b) => parseFloat(a.sell_price) - parseFloat(b.sell_price));
            if (sortValue === 'price_desc') rows.sort((a, b) => parseFloat(b.sell_price) - parseFloat(a.sell_price));
            if (sortValue === 'name_asc')   rows.sort((a, b) => a.name.localeCompare(b.name));
            if (sortValue === 'newest')     rows.sort((a, b) => new Date(b.createdAt || b.created_at) - new Date(a.createdAt || a.created_at));

            const $grid = $('#product-grid');
            $grid.empty();
            $('#product-loading').hide();
            $('#results-count').text(rows.length ? `${rows.length} product${rows.length !== 1 ? 's' : ''} found` : '');

            if (!rows.length) {
                $('#product-empty').removeClass('hidden');
                $grid.hide();
                return;
            }

            $('#product-empty').addClass('hidden');
            $grid.show();

            rows.forEach(function (p) {
                const price = parseFloat(p.sell_price).toLocaleString('en-PH', { style: 'currency', currency: 'PHP' });
                const imgSrc = p.images?.length
                    ? `${API_BASE.replace('/api/v1', '')}/${p.images[0]}`
                    : 'https://placehold.co/400x300/f1f5f9/94a3b8?text=No+Image';
                const inStock = p.stock_quantity > 0;
                const stockLabel = inStock
                    ? `<span class="text-xs text-emerald-600 font-medium"><i class="fa-solid fa-check text-[10px] mr-1"></i>${p.stock_quantity} in stock</span>`
                    : `<span class="text-xs text-red-500 font-medium"><i class="fa-solid fa-xmark text-[10px] mr-1"></i>Out of stock</span>`;

                const card = `
                <div class="product-card product-click cursor-pointer" data-id="${p.id}">
                    <img src="${imgSrc}" alt="${p.name}" loading="lazy"
                        onerror="this.src='https://placehold.co/400x300/f1f5f9/94a3b8?text=No+Image'">
                    <div class="p-5 flex flex-col flex-1">
                        <div class="flex-1">
                            <p class="text-[11px] text-[#2a52be] font-semibold uppercase tracking-wider mb-1">
                                ${(p.Categories || p.categories || []).map(c => c.name).join(', ') || 'Product'}
                            </p>
                            <h3 class="font-bold text-slate-900 text-[15px] leading-snug mb-1">${p.name}</h3>
                            <p class="text-xs text-slate-400 mb-3 line-clamp-2">${p.description || ''}</p>

                            <div class="flex flex-wrap gap-2 mb-3">
                                ${p.color ? `<span class="text-[11px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">${p.color}</span>` : ''}
                                ${p.storage ? `<span class="text-[11px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">${p.storage}</span>` : ''}
                            </div>
                        </div>

                        <div class="flex items-center justify-between mt-auto pt-3 border-t border-slate-100">
                            <div>
                                <div class="text-lg font-extrabold text-slate-900">${price}</div>
                                ${stockLabel}
                            </div>

                            ${inStock ? `
                            <div class="flex items-center gap-2">
                                <button
                                    class="add-to-cart-btn bg-[#2a52be] hover:bg-[#1f3d90] text-white rounded-xl px-3.5 py-2 text-sm font-semibold flex items-center gap-1.5 shadow-sm"
                                    data-id="${p.id}"
                                    id="atc-${p.id}">
                                    <i class="fa-solid fa-bag-shopping text-xs"></i> Add
                                </button>
                                <button
                                    class="buy-now-btn bg-slate-900 hover:bg-black text-white rounded-xl px-3.5 py-2 text-sm font-semibold shadow-sm"
                                    data-id="${p.id}">
                                    Buy Now
                                </button>
                            </div>
                            ` : `
                            <button disabled class="bg-slate-100 text-slate-400 rounded-xl px-4 py-2 text-sm font-semibold cursor-not-allowed">
                                Unavailable
                            </button>
                            `}
                        </div>
                    </div>
                </div>`;
                $grid.append(card);
            });
        }

        /* ── add to cart ─────────────────────────────────────────── */
        $(document).on('click', '.add-to-cart-btn', function () {
            if (!isSignedIn()) {
                showToast('Please sign in to add items to your cart.', 'error');
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }

            const productId = $(this).data('id');
            const quantity  = 1;
            const $btn = $(this);

            $btn.addClass('loading').html('<i class="fa-solid fa-circle-notch fa-spin text-xs"></i>');

            $.ajax({
                url: `${API_BASE}/cart`,
                method: 'POST',
                headers: authHeaders(),
                contentType: 'application/json',
                data: JSON.stringify({ product_id: productId, quantity })
            }).done(function () {
                showToast('Added to cart!', 'success');
                updateCartCount();
                $btn.removeClass('loading').html('<i class="fa-solid fa-check text-xs"></i> Added');
                setTimeout(() => $btn.html('<i class="fa-solid fa-bag-shopping text-xs"></i> Add'), 1800);
            }).fail(function (xhr) {
                showToast(xhr.responseJSON?.error || 'Could not add to cart.', 'error');
                $btn.removeClass('loading').html('<i class="fa-solid fa-bag-shopping text-xs"></i> Add');
            });
        });

        /* ── buy now ─────────────────────────────────────────────── */
        $(document).on('click', '.buy-now-btn', function () {
            if (!isSignedIn()) {
                showToast('Please sign in to continue.', 'error');
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }

            const productId = $(this).data('id');
            const quantity  = 1;
            const $btn = $(this);

            if ($btn.prop('disabled')) return;
            $btn.prop('disabled', true).text('Processing...');

            $.ajax({
                url: `${API_BASE}/cart`,
                method: 'POST',
                headers: authHeaders(),
                contentType: 'application/json',
                data: JSON.stringify({ product_id: productId, quantity })
            }).done(function (res) {
                const cartItemId = res.result?.id || res.row?.id || res.id;
                if (cartItemId) {
                    sessionStorage.setItem('checkoutCartIds', JSON.stringify([cartItemId]));
                } else {
                    sessionStorage.removeItem('checkoutCartIds');
                }
                window.location.href = 'checkout.html';
            }).fail(function (xhr) {
                showToast(xhr.responseJSON?.error || 'Could not proceed to checkout.', 'error');
                $btn.prop('disabled', false).text('Buy Now');
            });
        });

        /* ── sort ────────────────────────────────────────────────── */
        $('#sort-select').on('change', function () {
            sortValue = $(this).val();
            renderProducts();
        });

        /* ── admin redirect ──────────────────────────────────────── */
        if (isSignedIn()) {
            $.ajax({ url: `${API_BASE}/users/me`, method: 'GET', headers: authHeaders() })
            .done(function (res) {
                if (res.user.role === 'admin') window.location.href = 'admin.html';
            }).fail(function () {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
            });
        }

        /* ── product click -> go to product detail page ─────────── */
        $(document).on('click', '.product-click', function (e) {
            if ($(e.target).closest('.add-to-cart-btn,.buy-now-btn').length) {
                return;
            }
            const id = $(this).data('id');
            window.location.href = `product.html?id=${id}`;
        });

        /* ── init ────────────────────────────────────────────────── */
        updateAuthBtn();
        updateCartCount();
        loadCategories();
        loadProducts();

        // Coming from "Write Review" link on orders.html (shop.html?review=ID)
        const reviewProduct = new URLSearchParams(window.location.search).get('review');
        if (reviewProduct) {
            window.location.href = `product.html?id=${reviewProduct}`;
        }
        $(window).on('scroll', function () {
            if (loading || !hasMore) return;

            console.log("scrolling");

            if (
                $(window).scrollTop() + $(window).height() >=
                $(document).height() - 300
            ) {
                console.log("Loading next page...");
                loadProducts();
            }
        });
    });
    </script>
</body>
</html>
